[env:az-delivery-devkit-v4]
platform = espressif32@6.12.0
board = az-delivery-devkit-v4
framework = arduino
lib_deps = 
	adafruit/Adafruit PWM Servo Driver Library@^3.0.2
	braydenanderson2014/SimpleVector@^1.0.9
monitor_speed = 115200

[env:esp8266]
platform = espressif8266
board = huzzah
framework = arduino
lib_deps = 
	adafruit/Adafruit PWM Servo Driver Library@^3.0.2
	braydenanderson2014/SimpleVector@^1.0.9
monitor_speed = 115200

[env:uno]
platform = atmelavr
board = uno
framework = arduino

[platformio]
description = codice principale per il controllo del movimento di una testa animatronic

